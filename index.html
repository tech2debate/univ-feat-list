
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme: light dark;
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
  --border-radius-md: 12px;

  --color-background-primary:#ffffff;
  --color-background-secondary:#f6f7f9;
  --color-background-tertiary:#eef1f4;
  --color-text-primary:#0f172a;
  --color-text-secondary:#334155;
  --color-text-tertiary:#64748b;
  --color-border-secondary:rgba(15, 23, 42, 0.22);
  --color-border-tertiary:rgba(15, 23, 42, 0.12);

  --shadow-elev-1: 0 1px 1px rgba(2, 6, 23, 0.06), 0 10px 28px rgba(2, 6, 23, 0.06);
  --focus-ring: 0 0 0 3px rgba(55, 138, 221, 0.28);
}
:root[data-theme="dark"]{
  --color-background-primary:#0b1220;
  --color-background-secondary:#0f1a2c;
  --color-background-tertiary:#15233a;
  --color-text-primary:#e6edf6;
  --color-text-secondary:#c4d1e1;
  --color-text-tertiary:#8aa0ba;
  --color-border-secondary:rgba(230, 237, 246, 0.24);
  --color-border-tertiary:rgba(230, 237, 246, 0.14);

  --shadow-elev-1: 0 1px 1px rgba(0, 0, 0, 0.2), 0 14px 34px rgba(0, 0, 0, 0.35);
  --focus-ring: 0 0 0 3px rgba(55, 138, 221, 0.35);
}

html,body{height:100%}
body{
  font-family:var(--font-sans);
  background:var(--color-background-primary);
  color:var(--color-text-primary);
}
.root{padding:1.25rem 0 2.25rem}
.container{width:min(1120px, calc(100% - 32px));margin:0 auto}
.topbar{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem}
.title{font-size:14px;font-weight:600;letter-spacing:0.01em;color:var(--color-text-primary);line-height:1.25}
.subtitle{font-size:12px;color:var(--color-text-tertiary);margin-top:2px;line-height:1.35}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.toggle{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:999px;
  border:0.5px solid var(--color-border-secondary);
  background:var(--color-background-secondary);
  color:var(--color-text-primary);
  cursor:pointer;user-select:none;
  transition:transform 0.06s ease, background 0.12s ease, border-color 0.12s ease;
  font-size:12px;font-weight:600;
}
.toggle:active{transform:translateY(1px)}
.toggle:hover{border-color:var(--color-border-secondary)}
.toggle:focus-visible{outline:none;box-shadow:var(--focus-ring)}
.toggle .dot{width:10px;height:10px;border-radius:999px;background:var(--color-text-primary);opacity:0.85}
.toggle .hint{font-weight:500;color:var(--color-text-tertiary)}
.toggle[data-mode="dark"] .dot{background:#b7a5ff}
.toggle[data-mode="light"] .dot{background:#0f172a}

.persona-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:0.5rem}
.ptab{font-size:11px;padding:5px 12px;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all 0.12s}
.ptab.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.search-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-row input{flex:1;font-size:13px;padding:9px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.search-row input:focus-visible{outline:none;box-shadow:var(--focus-ring);border-color:rgba(55, 138, 221, 0.55)}
.count-label{font-size:12px;color:var(--color-text-tertiary);white-space:nowrap}
.domain-block{margin-bottom:1.2rem}
.domain-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-tertiary);margin-bottom:2px;box-shadow:var(--shadow-elev-1)}
.domain-hdr:hover{border-color:var(--color-border-secondary)}
.domain-name{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1}
.domain-count{font-size:11px;color:var(--color-text-tertiary)}
.chevron{font-size:10px;color:var(--color-text-tertiary);transition:transform 0.15s}
.chevron.open{transform:rotate(90deg)}
.alp-badge{font-size:9px;padding:2px 8px;border-radius:10px;background:#7B2D8B;color:#fff;font-weight:500}
.feat-table{display:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.feat-table.open{display:block}
.feat-row{display:grid;grid-template-columns:2fr 1.2fr 80px 80px;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);padding:8px 14px;align-items:center}
.feat-row:last-child{border-bottom:none}
.feat-row:hover{background:var(--color-background-secondary)}
.feat-row.hdr{background:var(--color-background-tertiary);padding:6px 14px}
.feat-row.alp-row{background:rgba(123,45,139,0.05)}
.feat-name{font-size:12px;color:var(--color-text-primary);line-height:1.4}
.feat-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.4}
.feat-hdr-label{font-size:10px;color:var(--color-text-tertiary);font-weight:500;letter-spacing:0.03em}
.pill{font-size:9px;padding:2px 7px;border-radius:10px;display:inline-block;margin:1px}
.p-s{background:#E1F5EE;color:#0F6E56}
.p-f{background:#E6F1FB;color:#185FA5}
.p-a{background:#EEEDFE;color:#534AB7}
.p-r{background:#FAEEDA;color:#854F0B}
.p-m{background:#FBEAF0;color:#993556}
.p-p{background:#F0E6F8;color:#7B2D8B}
.ch-web{font-size:10px;color:var(--color-text-tertiary)}
.ch-mob{font-size:10px;color:#1D9E75}
.ch-both{font-size:10px;color:#185FA5}
.prio-core{font-size:9px;padding:2px 6px;border-radius:8px;background:#E1F5EE;color:#0F6E56}
.prio-opt{font-size:9px;padding:2px 6px;border-radius:8px;background:#E6F1FB;color:#185FA5}
.prio-gth{font-size:9px;padding:2px 6px;border-radius:8px;background:#FAEEDA;color:#854F0B}
.prio-alp{font-size:9px;padding:2px 6px;border-radius:8px;background:#F0E6F8;color:#7B2D8B}
.legend-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%}

:root[data-theme="dark"] .p-s{background:#085041;color:#9FE1CB}
:root[data-theme="dark"] .p-f{background:#0C447C;color:#B5D4F4}
:root[data-theme="dark"] .p-a{background:#3C3489;color:#CECBF6}
:root[data-theme="dark"] .p-r{background:#633806;color:#FAC775}
:root[data-theme="dark"] .p-m{background:#72243E;color:#F4C0D1}
:root[data-theme="dark"] .p-p{background:#4A1060;color:#D9AAEC}
:root[data-theme="dark"] .prio-core{background:#085041;color:#9FE1CB}
:root[data-theme="dark"] .prio-opt{background:#0C447C;color:#B5D4F4}
:root[data-theme="dark"] .prio-gth{background:#633806;color:#FAC775}
:root[data-theme="dark"] .prio-alp{background:#4A1060;color:#D9AAEC}
:root[data-theme="dark"] .feat-row.alp-row{background:rgba(123,45,139,0.12)}

@media (max-width: 860px){
  .feat-row{grid-template-columns: 1.8fr 1.1fr 70px 74px}
}
@media (max-width: 720px){
  .topbar{align-items:stretch}
  .actions{justify-content:flex-start}
  .feat-row{grid-template-columns: 1.6fr 1fr 64px 72px}
}
</style>

let activePersona = 'all';
let searchTerm = '';

function getPreferredTheme(){
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function getStoredTheme(){
  try{ return localStorage.getItem('theme'); }catch(_){ return null; }
}
function setStoredTheme(value){
  try{
    if(value===null) localStorage.removeItem('theme');
    else localStorage.setItem('theme', value);
  }catch(_){}
}
function applyTheme(mode, source){
  const root = document.documentElement;
  root.dataset.theme = mode;
  const btn = document.getElementById('themeToggle');
  const label = document.getElementById('themeLabel');
  const hint = document.getElementById('themeHint');
  if(btn) btn.dataset.mode = mode;
  if(label) label.textContent = mode === 'dark' ? 'Dark' : 'Light';
  if(hint) hint.textContent = source === 'stored' ? '(saved)' : '(auto)';
}
function initTheme(){
  const stored = getStoredTheme();
  const mode = (stored === 'dark' || stored === 'light') ? stored : getPreferredTheme();
  applyTheme(mode, stored ? 'stored' : 'auto');
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      const stillAuto = !getStoredTheme();
      if(stillAuto) applyTheme(getPreferredTheme(), 'auto');
    });
  }
  const btn = document.getElementById('themeToggle');
  if(btn){
    btn.addEventListener('click', () => {
      const current = document.documentElement.dataset.theme || getPreferredTheme();
      const next = current === 'dark' ? 'light' : 'dark';
      setStoredTheme(next);
      applyTheme(next, 'stored');
    });
    btn.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      setStoredTheme(null);
      applyTheme(getPreferredTheme(), 'auto');
    });
  }
}

function matchPersona(f){
  if(activePersona==='all')return true;
  return f[2].includes(activePersona);
}
function matchSearch(f){
  if(!searchTerm)return true;
  const q=searchTerm.toLowerCase();
  return f[0].toLowerCase().includes(q)||f[1].toLowerCase().includes(q);
}
function personaPills(str){
  return str.trim().split(/\s+/).map(p=>`<span class="pill p-${p.toLowerCase()}">${p}</span>`).join('');
}
function channelLabel(ch){
  if(ch==='Mob')return'<span class="ch-mob">Mob</span>';
  if(ch==='Web')return'<span class="ch-web">Web</span>';
  return'<span class="ch-both">Both</span>';
}
function prioLabel(p){
  if(p==='core')return'<span class="prio-core">Core</span>';
  if(p==='opt')return'<span class="prio-opt">Optional</span>';
  if(p==='alp')return'<span class="prio-alp">ALP</span>';
  return'<span class="prio-gth">Nice</span>';
}

function render(){
  const container=document.getElementById('domains');
  container.innerHTML='';
  let total=0;
  DATA.forEach((domain,di)=>{
    const rows=domain.features.filter(f=>matchPersona(f)&&matchSearch(f));
    total+=rows.length;
    if(rows.length===0)return;
    const isAlp = domain.color==='#7B2D8B' && di===23;
    const block=document.createElement('div');
    block.className='domain-block';
    block.innerHTML=`
      <div class="domain-hdr" onclick="toggleDomain(${di})">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${domain.color};flex-shrink:0"></span>
        <span class="domain-name">${domain.domain}</span>
        <span class="domain-count">${rows.length} features</span>
        <span class="chevron" id="chev-${di}">▶</span>
      </div>
      <div class="feat-table" id="tbl-${di}">
        <div class="feat-row hdr">
          <span class="feat-hdr-label">Feature</span>
          <span class="feat-hdr-label">Who uses it</span>
          <span class="feat-hdr-label">Channel</span>
          <span class="feat-hdr-label">Priority</span>
        </div>
        ${rows.map(f=>`
        <div class="feat-row${f[5]?' alp-row':''}">
          <div><div class="feat-name">${f[5]?'<span style="color:#7B2D8B;font-size:9px;font-weight:600;margin-right:4px;">ALP</span>':''}${f[0]}</div><div class="feat-desc">${f[1]}</div></div>
          <div>${personaPills(f[2])}</div>
          <div>${channelLabel(f[3])}</div>
          <div>${prioLabel(f[4])}</div>
        </div>`).join('')}
      </div>`;
    container.appendChild(block);

    // Auto-open ALP domain and search results
    if(isAlp || searchTerm){
      setTimeout(()=>{
        const tbl=document.getElementById('tbl-'+di);
        const chev=document.getElementById('chev-'+di);
        if(tbl){tbl.classList.add('open');}
        if(chev){chev.classList.add('open');}
      },10);
    }
  });
  document.getElementById('cnt').textContent=total+' features';
}

function toggleDomain(di){
  const tbl=document.getElementById('tbl-'+di);
  const chev=document.getElementById('chev-'+di);
  const open=tbl.classList.contains('open');
  tbl.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}
function filterPersona(p,btn){
  activePersona=p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function doSearch(){
  searchTerm=document.getElementById('srch').value;
  render();
}

initTheme();
render();
</script>
